<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mockuply · Clean</title>
<style>
  :root{
    --bg:#fafafa; --panel:#fff; --line:#ececed; --ink:#18181b; --sub:#71717a;
    --accent:#18181b; --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;
    background:var(--bg);color:var(--ink);height:100vh;overflow:hidden}
  .app{display:grid;grid-template-columns:320px 1fr;height:100vh}
  /* sidebar */
  .side{background:var(--panel);border-right:1px solid var(--line);
    padding:24px;overflow-y:auto;display:flex;flex-direction:column;gap:26px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:19px;letter-spacing:-.02em}
  .brand .dot{width:26px;height:26px;border-radius:8px;background:var(--ink);display:grid;place-items:center;color:#fff;font-size:14px}
  .brand small{display:block;font-weight:400;font-size:11px;color:var(--sub);letter-spacing:0}
  .group>h3{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--sub);margin-bottom:12px;font-weight:600}
  .devices{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .chip{border:1px solid var(--line);background:#fff;border-radius:10px;padding:10px 8px;
    font-size:13px;cursor:pointer;text-align:center;transition:.15s;color:var(--ink)}
  .chip:hover{border-color:#d4d4d8}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .swatches{display:grid;grid-template-columns:repeat(6,1fr);gap:7px}
  .sw{aspect-ratio:1;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:.15s}
  .sw.on{border-color:var(--ink);box-shadow:0 0 0 2px #fff inset}
  .sw.transparent{background:
    conic-gradient(#e5e5e5 0 25%,#fff 0 50%,#e5e5e5 0 75%,#fff 0)50%/10px 10px}
  label.row{display:flex;justify-content:space-between;font-size:12px;color:var(--sub);margin-bottom:6px}
  input[type=range]{width:100%;accent-color:var(--ink)}
  input[type=text]{width:100%;border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-size:13px;color:var(--ink)}
  .slider+.slider{margin-top:16px}
  /* stage */
  .stage{display:flex;flex-direction:column;background:
    radial-gradient(circle at 20% 10%,#fff,transparent 60%),var(--bg)}
  .topbar{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;border-bottom:1px solid var(--line)}
  .topbar .actions{display:flex;gap:10px}
  .btn{border:1px solid var(--line);background:#fff;border-radius:10px;padding:9px 16px;font-size:13px;font-weight:500;cursor:pointer;color:var(--ink);transition:.15s;display:flex;align-items:center;gap:6px}
  .btn:hover{border-color:#d4d4d8}
  .btn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
  .btn.primary:hover{opacity:.88}
  .canvas-wrap{flex:1;display:grid;place-items:center;padding:40px;overflow:auto}
  #canvas{max-width:100%;max-height:100%;border-radius:8px}
  .drop{position:absolute;inset:0;display:none;place-items:center;background:rgba(250,250,250,.9);
    border:2px dashed var(--ink);border-radius:16px;z-index:5;font-size:15px;color:var(--sub)}
  .drop.show{display:grid}
  .stage-inner{position:relative;flex:1;display:flex;flex-direction:column}
  .hint{font-size:11px;color:var(--sub);text-align:center;padding:0 0 14px}
  .upload-cta{border:1.5px dashed var(--line);border-radius:12px;padding:18px;text-align:center;cursor:pointer;color:var(--sub);font-size:13px;transition:.15s}
  .upload-cta:hover{border-color:var(--ink);color:var(--ink)}
  a.back{font-size:12px;color:var(--sub);text-decoration:none}
</style>
</head>
<body data-default-device="browser" data-default-bg="violet">
<div class="app">
  <aside class="side">
    <div class="brand">
      <span class="dot">◳</span>
      <div>Mockuply<small>Clean edition · style 1</small></div>
    </div>

    <div class="group">
      <div class="upload-cta" id="uploadCta">
        📤 Click, drop, or paste (⌘V) an image
        <input type="file" id="file" accept="image/*" hidden>
      </div>
    </div>

    <div class="group">
      <h3>Device</h3>
      <div class="devices" id="devices"></div>
    </div>

    <div class="group">
      <h3>Background</h3>
      <div class="swatches" id="swatches"></div>
    </div>

    <div class="group" id="urlGroup">
      <h3>Browser URL</h3>
      <input type="text" id="url" value="yoursite.com">
    </div>

    <div class="group">
      <h3>Adjust</h3>
      <div class="slider"><label class="row"><span>Padding</span><span id="padVal">90</span></label>
        <input type="range" id="pad" min="0" max="280" value="90"></div>
      <div class="slider"><label class="row"><span>Corner radius</span><span id="radVal">20</span></label>
        <input type="range" id="rad" min="0" max="60" value="20"></div>
      <div class="slider"><label class="row"><span>Shadow</span><span id="shVal">35%</span></label>
        <input type="range" id="sh" min="0" max="100" value="35"></div>
    </div>
    <a class="back" href="index.html">← เปลี่ยนสไตล์</a>
  </aside>

  <main class="stage">
    <div class="topbar">
      <strong style="font-size:14px">Preview</strong>
      <div class="actions">
        <button class="btn" id="copyBtn">📋 Copy</button>
        <button class="btn primary" id="dlBtn">⬇ Download PNG</button>
      </div>
    </div>
    <div class="stage-inner">
      <div class="drop" id="drop">Drop image to load</div>
      <div class="canvas-wrap"><canvas id="canvas"></canvas></div>
      <div class="hint">ทำงานฝั่งเบราว์เซอร์ล้วน · รูปของคุณไม่ถูกอัพโหลดไปไหน</div>
    </div>
  </main>
</div>

<script src="mockup-engine.js"></script>
<script src="app-wiring.js"></script>
</body>
</html>
