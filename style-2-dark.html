<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Framez · Dark Glass</title>
<style>
  :root{--accent:#7c5cff;--accent2:#22d3ee;--glass:rgba(255,255,255,.06);--line:rgba(255,255,255,.12);--ink:#f4f4f8;--sub:#a1a1b5}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Inter",-apple-system,BlinkMacSystemFont,sans-serif;color:var(--ink);height:100vh;overflow:hidden;
    background:#08080f;
    background-image:
      radial-gradient(50vw 50vw at 80% -10%,rgba(124,92,255,.35),transparent 60%),
      radial-gradient(45vw 45vw at 5% 110%,rgba(34,211,238,.28),transparent 60%);}
  .app{display:grid;grid-template-columns:300px 1fr;height:100vh;padding:18px;gap:18px}
  .glass{background:var(--glass);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
    border:1px solid var(--line);border-radius:22px}
  /* sidebar */
  .side{padding:22px;overflow-y:auto;display:flex;flex-direction:column;gap:24px}
  .brand{display:flex;align-items:center;gap:11px;font-weight:700;font-size:19px;letter-spacing:-.02em}
  .brand .dot{width:30px;height:30px;border-radius:10px;display:grid;place-items:center;font-size:15px;color:#fff;
    background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 0 20px rgba(124,92,255,.5)}
  .brand small{display:block;font-weight:400;font-size:11px;color:var(--sub);letter-spacing:0}
  h3{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--sub);margin-bottom:12px;font-weight:600}
  .devices{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .chip{border:1px solid var(--line);background:rgba(255,255,255,.03);border-radius:11px;padding:10px 8px;
    font-size:13px;cursor:pointer;text-align:center;transition:.18s;color:var(--ink)}
  .chip:hover{background:rgba(255,255,255,.08)}
  .chip.on{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;
    box-shadow:0 4px 18px rgba(124,92,255,.4);color:#fff;font-weight:600}
  .swatches{display:grid;grid-template-columns:repeat(6,1fr);gap:7px}
  .sw{aspect-ratio:1;border-radius:9px;cursor:pointer;border:2px solid transparent;transition:.15s}
  .sw:hover{transform:scale(1.08)}
  .sw.on{border-color:#fff;box-shadow:0 0 14px rgba(255,255,255,.4)}
  .sw.transparent{background:conic-gradient(#3a3a44 0 25%,#22222a 0 50%,#3a3a44 0 75%,#22222a 0)50%/10px 10px}
  label.row{display:flex;justify-content:space-between;font-size:12px;color:var(--sub);margin-bottom:7px}
  label.row span:last-child{color:var(--ink);font-variant-numeric:tabular-nums}
  input[type=range]{width:100%;accent-color:var(--accent)}
  input[type=text]{width:100%;background:rgba(0,0,0,.25);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:13px;color:var(--ink)}
  .slider+.slider{margin-top:16px}
  .upload-cta{border:1.5px dashed var(--line);border-radius:14px;padding:20px;text-align:center;cursor:pointer;color:var(--sub);font-size:13px;transition:.18s}
  .upload-cta:hover{border-color:var(--accent);color:var(--ink);background:rgba(124,92,255,.08)}
  a.back{font-size:12px;color:var(--sub);text-decoration:none}
  a.back:hover{color:var(--ink)}
  /* stage */
  .stage{display:flex;flex-direction:column;position:relative;overflow:hidden}
  .topbar{display:flex;justify-content:space-between;align-items:center;padding:16px 22px;border-bottom:1px solid var(--line)}
  .actions{display:flex;gap:10px}
  .btn{border:1px solid var(--line);background:rgba(255,255,255,.05);border-radius:11px;padding:9px 16px;font-size:13px;font-weight:500;cursor:pointer;color:var(--ink);transition:.18s;display:flex;align-items:center;gap:6px}
  .btn:hover{background:rgba(255,255,255,.12)}
  .btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;color:#fff;
    box-shadow:0 4px 20px rgba(124,92,255,.45)}
  .canvas-wrap{flex:1;display:grid;place-items:center;padding:40px;overflow:auto}
  #canvas{max-width:100%;max-height:100%;border-radius:10px;filter:drop-shadow(0 30px 60px rgba(0,0,0,.5))}
  .drop{position:absolute;inset:0;display:none;place-items:center;background:rgba(8,8,15,.85);
    border:2px dashed var(--accent);border-radius:22px;z-index:5;font-size:16px;color:var(--ink)}
  .drop.show{display:grid}
  .hint{font-size:11px;color:var(--sub);text-align:center;padding:0 0 14px}
</style>
</head>
<body data-default-device="iphone" data-default-bg="midnight">
<div class="app">
  <aside class="side glass">
    <div class="brand"><span class="dot">◈</span><div>Framez<small>Dark Glass · style 2</small></div></div>
    <div class="upload-cta" id="uploadCta">✨ Drop / paste / click to add image
      <input type="file" id="file" accept="image/*" hidden></div>
    <div><h3>Device</h3><div class="devices" id="devices"></div></div>
    <div><h3>Background</h3><div class="swatches" id="swatches"></div></div>
    <div id="urlGroup"><h3>Browser URL</h3><input type="text" id="url" value="yoursite.com"></div>
    <div>
      <h3>Adjust</h3>
      <div class="slider"><label class="row"><span>Padding</span><span id="padVal">120</span></label>
        <input type="range" id="pad" min="0" max="280" value="120"></div>
      <div class="slider"><label class="row"><span>Radius</span><span id="radVal">28</span></label>
        <input type="range" id="rad" min="0" max="60" value="28"></div>
      <div class="slider"><label class="row"><span>Shadow</span><span id="shVal">50%</span></label>
        <input type="range" id="sh" min="0" max="100" value="50"></div>
    </div>
    <div id="extra"></div>
    <a class="back" href="index.html">← เปลี่ยนสไตล์</a>
  </aside>

  <main class="stage glass">
    <div class="topbar">
      <strong style="font-size:14px">Live preview</strong>
      <div class="actions">
        <button class="btn" id="copyBtn">📋 Copy</button>
        <button class="btn primary" id="dlBtn">⬇ Download PNG</button>
      </div>
    </div>
    <div class="drop" id="drop">Drop to load ⚡</div>
    <div class="canvas-wrap"><canvas id="canvas"></canvas></div>
    <div class="hint">100% ในเบราว์เซอร์ · ไม่มีการอัพโหลดรูปขึ้นเซิร์ฟเวอร์</div>
  </main>
</div>
<script src="qrcode.js"></script>
<script src="mockup-engine.js"></script>
<script src="app-wiring.js"></script>
<script>
  // dark style opens with bigger padding/radius/shadow defaults
  engine.setOptions({padding:120,radius:28,shadow:0.5});
</script>
</body>
</html>
