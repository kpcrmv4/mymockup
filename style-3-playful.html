<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNAPPY! · Bold</title>
<style>
  :root{--ink:#141414;--paper:#fff5e6;--pink:#ff5da2;--yellow:#ffd23f;--blue:#4d9fff;--green:#3ddc84}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Poppins","Baloo 2",-apple-system,sans-serif;color:var(--ink);height:100vh;overflow:hidden;
    background:var(--paper);
    background-image:radial-gradient(var(--ink) 1.4px,transparent 1.4px);background-size:26px 26px}
  .shadow{box-shadow:5px 5px 0 var(--ink)}
  .app{display:flex;flex-direction:column;height:100vh;padding:16px;gap:16px}
  /* header */
  header{display:flex;justify-content:space-between;align-items:center;background:var(--yellow);
    border:3px solid var(--ink);border-radius:18px;padding:12px 20px}
  header .logo{font-weight:800;font-size:24px;letter-spacing:-.03em;display:flex;align-items:center;gap:10px}
  header .logo .b{background:var(--pink);color:#fff;border:3px solid var(--ink);border-radius:12px;
    width:40px;height:40px;display:grid;place-items:center;font-size:20px;transform:rotate(-6deg)}
  header .tag{font-size:12px;font-weight:600;background:#fff;border:2px solid var(--ink);border-radius:20px;padding:4px 12px}
  .actions{display:flex;gap:10px}
  .btn{border:3px solid var(--ink);border-radius:14px;padding:10px 18px;font-size:14px;font-weight:700;cursor:pointer;
    background:#fff;color:var(--ink);transition:.1s;display:flex;align-items:center;gap:6px}
  .btn:hover{transform:translate(-2px,-2px);box-shadow:3px 3px 0 var(--ink)}
  .btn:active{transform:translate(0,0);box-shadow:none}
  .btn.primary{background:var(--green)}
  .btn.copy{background:var(--blue);color:#fff}
  /* body */
  .main{flex:1;display:grid;grid-template-columns:1fr 300px;gap:16px;min-height:0}
  .stage{background:#fff;border:3px solid var(--ink);border-radius:20px;position:relative;overflow:hidden;
    display:grid;place-items:center;padding:30px}
  .stage::before{content:"PREVIEW";position:absolute;top:12px;left:16px;font-weight:800;font-size:12px;
    background:var(--pink);color:#fff;border:2px solid var(--ink);border-radius:20px;padding:3px 12px;transform:rotate(-3deg)}
  #canvas{max-width:100%;max-height:100%;border-radius:8px}
  .drop{position:absolute;inset:0;display:none;place-items:center;background:rgba(255,245,230,.92);
    border:3px dashed var(--ink);border-radius:20px;z-index:5;font-size:22px;font-weight:800}
  .drop.show{display:grid}
  /* controls panel */
  .panel{background:#fff;border:3px solid var(--ink);border-radius:20px;padding:18px;overflow-y:auto;
    display:flex;flex-direction:column;gap:20px}
  h3{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px;
    display:inline-block;background:var(--yellow);border:2px solid var(--ink);border-radius:8px;padding:2px 8px}
  .upload-cta{border:3px dashed var(--ink);border-radius:16px;padding:18px;text-align:center;cursor:pointer;
    font-size:13px;font-weight:700;background:var(--paper);transition:.1s}
  .upload-cta:hover{background:var(--yellow)}
  .devices{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .chip{border:2.5px solid var(--ink);background:#fff;border-radius:12px;padding:9px 6px;font-size:13px;
    font-weight:600;cursor:pointer;text-align:center;transition:.1s}
  .chip:hover{background:var(--paper)}
  .chip.on{background:var(--pink);color:#fff}
  .swatches{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}
  .sw{aspect-ratio:1;border-radius:8px;cursor:pointer;border:2.5px solid var(--ink);transition:.1s}
  .sw:hover{transform:scale(1.1)}
  .sw.on{outline:3px solid var(--blue);outline-offset:1px}
  .sw.transparent{background:conic-gradient(#ddd 0 25%,#fff 0 50%,#ddd 0 75%,#fff 0)50%/10px 10px}
  label.row{display:flex;justify-content:space-between;font-size:12px;font-weight:600;margin-bottom:6px}
  input[type=range]{width:100%;accent-color:var(--pink);height:8px}
  input[type=text]{width:100%;border:2.5px solid var(--ink);border-radius:10px;padding:9px 12px;font-size:13px;font-weight:600}
  .slider+.slider{margin-top:14px}
  a.back{font-size:12px;font-weight:700;color:var(--ink);text-decoration:none;text-align:center;display:block}
</style>
</head>
<body data-default-device="macbook" data-default-bg="sunset">
<div class="app">
  <header class="shadow">
    <div class="logo"><span class="b">◑</span>SNAPPY!</div>
    <span class="tag">🎨 Bold edition · style 3</span>
    <div class="actions">
      <button class="btn copy" id="copyBtn">📋 Copy</button>
      <button class="btn primary" id="dlBtn">⬇ Download!</button>
    </div>
  </header>

  <div class="main">
    <div class="stage shadow">
      <div class="drop" id="drop">DROP IT! 🎯</div>
      <canvas id="canvas"></canvas>
    </div>

    <aside class="panel shadow">
      <div class="upload-cta" id="uploadCta">📸 คลิก / ลาก / วาง (⌘V) รูป
        <input type="file" id="file" accept="image/*" hidden></div>
      <div><h3>Device</h3><div class="devices" id="devices"></div></div>
      <div><h3>Background</h3><div class="swatches" id="swatches"></div></div>
      <div id="urlGroup"><h3>URL</h3><input type="text" id="url" value="yoursite.com"></div>
      <div>
        <h3>Tweak</h3>
        <div class="slider"><label class="row"><span>Padding</span><span id="padVal">80</span></label>
          <input type="range" id="pad" min="0" max="280" value="80"></div>
        <div class="slider"><label class="row"><span>Radius</span><span id="radVal">16</span></label>
          <input type="range" id="rad" min="0" max="60" value="16"></div>
        <div class="slider"><label class="row"><span>Shadow</span><span id="shVal">40%</span></label>
          <input type="range" id="sh" min="0" max="100" value="40"></div>
      </div>
      <div id="extra"></div>
      <a class="back" href="index.html">← เปลี่ยนสไตล์</a>
    </aside>
  </div>
</div>
<script src="qrcode.js"></script>
<script src="mockup-engine.js"></script>
<script src="app-wiring.js"></script>
<script>engine.setOptions({padding:80,radius:16,shadow:0.4});</script>
</body>
</html>
